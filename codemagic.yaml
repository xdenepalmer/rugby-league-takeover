# Codemagic CI/CD — builds the Capacitor iOS app on Codemagic's macOS runners,
# so no local Mac is needed (works from Windows).
#
# ── REFERENCE SIGNING TEMPLATE ────────────────────────────────────────────────
# Every app in the account shares ONE distribution certificate. The RSA private
# key lives once as the secured Codemagic variable CERTIFICATE_PRIVATE_KEY in the
# 'appstore' variable group. Because all apps use the SAME key, fetch-signing
# -files reuses the single existing certificate instead of minting a new one —
# Apple caps distribution certs, so a key-per-app setup eventually wedges.
#
# To onboard a NEW app: copy the 'Set up code signing' step verbatim, set
# BUNDLE_ID, attach the 'appstore' group, and reuse the App Store Connect API
# key integration. NEVER run `openssl genrsa` for a new app — reuse the shared
# key so the shared certificate is reused.
#
# One-time in the Codemagic UI before the first green build:
#   1. App Store Connect API key integration named "app_store_connect".
#   2. The 'appstore' variable group containing CERTIFICATE_PRIVATE_KEY (secure)
#      — the shared distribution key.
#   3. In the Apple Developer portal, enable Push Notifications + Associated
#      Domains on the App ID (see docs/iOS_RUNBOOK.md).
# The project is SPM-based (no CocoaPods): build the .xcodeproj directly.
workflows:
  ios-capacitor:
    name: iOS build (Capacitor shell)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        # Shared, team/app-scoped group holding CERTIFICATE_PRIVATE_KEY (secure)
        # — the one distribution key reused across every app in the account.
        - appstore
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.rugbyleaguetakeover.app"
    integrations:
      app_store_connect: app_store_connect
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Validation gate (same as GitHub CI)
        script: npm run lint && npm run typecheck && npm test
      - name: Build web assets and sync into the iOS shell
        script: npm run build && npx cap sync ios
      # Shared-certificate signing. --certificate-key points at the account-wide
      # distribution key; --create only mints a certificate if none matches that
      # key, so after the first app creates it, every app reuses the same one.
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      # App Store Connect rejects an IPA whose CFBundleVersion it has already
      # seen ("attribute with a value that has already been used"). The Xcode
      # project pins CURRENT_PROJECT_VERSION=1, so every upload after the
      # first fails — bump the build number past the highest one TestFlight
      # knows before archiving.
      - name: Increment build number
        script: |
          set -eo pipefail
          cd ios/App
          APP_APPLE_ID=$(app-store-connect list-apps \
            --bundle-id-identifier "$BUNDLE_ID" \
            --json | jq -r '.[0].id')
          # Fail LOUDLY on auth/bundle-id problems — a silent empty id would
          # fall back to build 1 and reproduce the duplicate-version failure.
          if [ -z "$APP_APPLE_ID" ] || [ "$APP_APPLE_ID" = "null" ]; then
            echo "ERROR: could not resolve the App Store Connect app id for $BUNDLE_ID" >&2
            exit 1
          fi
          # --all-versions: highest build number across ALL versions, so a
          # different marketing-version train can never hand back a low number.
          # The || fallback is ONLY for the very first upload (no builds yet).
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID" --all-versions || echo "")
          NEXT_BUILD_NUMBER=$(( ${LATEST_BUILD_NUMBER:-0} + 1 ))
          echo "Latest TestFlight build: ${LATEST_BUILD_NUMBER:-none} → building $NEXT_BUILD_NUMBER"
          agvtool new-version -all "$NEXT_BUILD_NUMBER"
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # Build-verify only: runs the validation gate + web build + iOS sync with
  # NO signing and NO TestFlight upload. Safe to run on any branch — use it
  # to smoke-check changes on a real macOS runner without shipping anything.
  # Only the ios-capacitor workflow above publishes, and only when started
  # deliberately (no triggering: block anywhere in this file).
  ios-build-verify:
    name: iOS build verify (no publishing)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Validation gate (same as GitHub CI)
        script: npm run lint && npm run typecheck && npm test
      - name: Build web assets and sync into the iOS shell
        script: npm run build && npx cap sync ios
      - name: Compile the iOS app (unsigned)
        script: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
