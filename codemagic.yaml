# Codemagic CI/CD — builds the Capacitor iOS app on Codemagic's macOS runners,
# so no local Mac is needed (works from Windows). STARTER CONFIG: before the
# first green build you must, in the Codemagic UI:
#   1. Connect the repo and create an App Store Connect API key integration
#      named "app_store_connect" (Teams > Integrations), or rename below.
#   2. Enable automatic code signing (ios_signing) — Codemagic creates/fetches
#      certs + profiles for bundle id com.rugbyleaguetakeover.app.
#   3. In the Apple Developer portal, add Push Notifications and Associated
#      Domains capabilities to the App ID (see docs/iOS_RUNBOOK.md).
# The project is SPM-based (no CocoaPods): build the .xcodeproj directly.
workflows:
  ios-capacitor:
    name: iOS build (Capacitor shell)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.rugbyleaguetakeover.app"
        APP_STORE_CONNECT_TEAM_ID: "25R438YK9F"
    integrations:
      app_store_connect: app_store_connect
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Validation gate (same as GitHub CI)
        script: npm run lint && npm run typecheck && npm test
      - name: Build web assets and sync into the iOS shell
        script: npm run build && npx cap sync ios
      # Explicit signing: the implicit `ios_signing:` block only *fetches* an
      # existing profile, so the very first build fails with "No matching
      # profiles found". `fetch-signing-files --create` generates the App Store
      # distribution certificate + provisioning profile via the API key on the
      # first run, then reuses them on later runs.
      # CERTIFICATE_PRIVATE_KEY (secure env var, added in the Codemagic UI) is
      # the RSA private key for the iOS Distribution certificate. It is required
      # because the account already has a distribution certificate whose private
      # key does not live on the fresh runner; passing the key lets fetch-signing
      # -files reuse it (or create a new cert FROM this key on the first run) and
      # import it into the keychain. Reusing the same key every build keeps a
      # single certificate instead of hitting Apple's distribution-cert limit.
      - name: Set up code signing (create cert + profile if missing)
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      # Read-only diagnostic: prints the entitlements Apple actually baked into
      # the fetched provisioning profile. If `aps-environment` and
      # `com.apple.developer.associated-domains` are absent here, the App ID
      # capabilities are not propagating onto the profile (the real blocker);
      # if they are present, the archive is failing for another reason. Runs
      # before build-ipa so it is captured even when the archive fails.
      - name: Diagnose provisioning profile capabilities
        script: |
          echo "=== App.entitlements requested by the target ==="
          cat ios/App/App/App.entitlements || true
          echo
          echo "=== Entitlements embedded in each fetched provisioning profile ==="
          shopt -s nullglob
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            echo "---- $p ----"
            security cms -D -i "$p" 2>/dev/null | plutil -extract Entitlements xml1 -o - - 2>/dev/null || true
            echo
          done
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
