# Codemagic CI/CD — builds the Capacitor iOS app on Codemagic's macOS runners,
# so no local Mac is needed (works from Windows).
#
# ── REFERENCE SIGNING TEMPLATE ────────────────────────────────────────────────
# Every app in the account shares ONE distribution certificate. The RSA private
# key lives once as the secured Codemagic variable CERTIFICATE_PRIVATE_KEY in the
# 'appstore' variable group. Because all apps use the SAME key, fetch-signing
# -files reuses the single existing certificate instead of minting a new one —
# Apple caps distribution certs, so a key-per-app setup eventually wedges.
#
# To onboard a NEW app: copy the 'Set up code signing' step verbatim, set
# BUNDLE_ID, attach the 'appstore' group, and reuse the App Store Connect API
# key integration. NEVER run `openssl genrsa` for a new app — reuse the shared
# key so the shared certificate is reused.
#
# One-time in the Codemagic UI before the first green build:
#   1. App Store Connect API key integration named "app_store_connect".
#   2. The 'appstore' variable group containing CERTIFICATE_PRIVATE_KEY (secure)
#      — the shared distribution key.
#   3. In the Apple Developer portal, enable Push Notifications + Associated
#      Domains on the App ID (see docs/iOS_RUNBOOK.md).
# The project is SPM-based (no CocoaPods): build the .xcodeproj directly.
workflows:
  ios-capacitor:
    name: iOS build (Capacitor shell)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        # Shared, team/app-scoped group holding CERTIFICATE_PRIVATE_KEY (secure)
        # — the one distribution key reused across every app in the account.
        - appstore
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.rugbyleaguetakeover.app"
    integrations:
      app_store_connect: app_store_connect
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Validation gate (same as GitHub CI)
        script: npm run lint && npm run typecheck && npm test
      - name: Build web assets and sync into the iOS shell
        script: npm run build && npx cap sync ios
      # Shared-certificate signing. --certificate-key points at the account-wide
      # distribution key; --create only mints a certificate if none matches that
      # key, so after the first app creates it, every app reuses the same one.
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      # App Store Connect rejects a re-used CFBundleVersion ("must be higher than
      # the previously uploaded version"). Stamp every build with Codemagic's
      # ever-incrementing $BUILD_NUMBER via CURRENT_PROJECT_VERSION (Info.plist
      # maps CFBundleVersion to it), so each upload is unique and monotonic.
      - name: Set a unique build number
        script: |
          set -e
          BN="${BUILD_NUMBER:-$(date +%s)}"
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = ${BN};/g" ios/App/App.xcodeproj/project.pbxproj
          echo "CFBundleVersion (CURRENT_PROJECT_VERSION) set to ${BN}"
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
