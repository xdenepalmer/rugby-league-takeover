name: CI

# Guards against the recurring regressions where Base44 auto-sync / concurrent
# commits re-introduce unused imports or revert hardened code. Runs the full gate
# on every push to main and every PR. To make this *block* bad commits, enable a
# branch-protection rule on `main` requiring the "validate" check to pass.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
