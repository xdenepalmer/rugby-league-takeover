<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <title>Rugby League Takeover Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030512;
        color: #f8fafc;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgba(249, 115, 22, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(249, 115, 22, 0.08) 1px, transparent 1px),
          #030512;
        background-size: 32px 32px;
      }

      main {
        max-width: 440px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.76);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1;
        text-transform: uppercase;
      }

      p {
        color: #cbd5e1;
        line-height: 1.65;
      }

      a {
        color: #f97316;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>The Rugby League Takeover app shell is installed, but live data and admin actions need a connection.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
