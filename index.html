<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a18d49a2b8f40f0f81cc26e/24c67d277_LASVEGAS.png" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a18d49a2b8f40f0f81cc26e/24c67d277_LASVEGAS.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <!-- Social share metadata (local assets for reliable previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rugby League Takeover" />
    <meta property="og:description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Rugby League Takeover" />
    <meta name="twitter:description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <meta name="twitter:image" content="/icons/icon-512.png" />
    <!-- Run fullscreen (no browser chrome) when added to the iOS/Android home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RLT Vegas" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Rugby League Takeover</title>
    <!-- Paint the dark background immediately so launching the installed app
         (and the translucent status bar area) never flashes white. -->
    <style>
      html { background-color: #030712; }
    </style>
    <script>
      // Prevent stale service-worker/dev caches from serving mismatched React chunks in preview.
      if (
        location.hostname.includes('preview') ||
        location.search.includes('_preview_token') ||
        location.search.includes('base44_data_env') ||
        location.search.includes('app_id') ||
        location.search.includes('access_token')
      ) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          });
        }
        if ('caches' in window) {
          caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
