<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a18d49a2b8f40f0f81cc26e/24c67d277_LASVEGAS.png?v=logo" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a18d49a2b8f40f0f81cc26e/24c67d277_LASVEGAS.png?v=logo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-title" content="RLT Vegas" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Rugby League Takeover</title>
    <script>
      // Prevent stale service-worker/dev caches from serving mismatched React chunks in preview.
      if (
        location.hostname.includes('preview') ||
        location.search.includes('_preview_token') ||
        location.search.includes('base44_data_env') ||
        location.search.includes('app_id') ||
        location.search.includes('access_token')
      ) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          });
        }
        if ('caches' in window) {
          caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
