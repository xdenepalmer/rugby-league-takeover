<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Inter/Oswald are self-hosted via @fontsource (imported in src/main.jsx):
         no CDN dependency, so the brand type works offline and inside the
         native iOS shell. Font files ship as hashed /assets and are cached by
         the service worker's static-asset strategy. -->
    <!-- Preload the home hero poster (LCP image) so it paints immediately -->
    <link rel="preload" as="image" href="https://ohytlrgfpcpvnqgdpqap.supabase.co/storage/v1/object/public/media/migrated/4d882498b_57895bb2-6bf0-4062-bbf3-78c2b309651a.jpeg" />
    <!-- Preload the hero logo so it appears with the first paint -->
    <link rel="preload" as="image" href="/icons/icon-192.png" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <!-- Social share metadata (local assets for reliable previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rugby League Takeover" />
    <meta property="og:description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <meta property="og:image" content="https://rugbyleaguetakeover.com/icons/icon-512.png" />
    <meta property="og:url" content="https://rugbyleaguetakeover.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rugby League Takeover" />
    <meta name="twitter:description" content="Rugby League Takeover Las Vegas news, forum, travel, events, and merch." />
    <meta name="twitter:image" content="https://rugbyleaguetakeover.com/icons/icon-512.png" />
    <link rel="canonical" href="https://rugbyleaguetakeover.com" />
    <!-- Run fullscreen (no browser chrome) when added to the iOS/Android home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RLT Vegas" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Rugby League Takeover</title>
    <!-- Paint the dark background immediately so launching the installed app
         (and the translucent status bar area) never flashes white. -->
    <style>
      html { background-color: #030712; }
    </style>
    <!-- External file (not inline) so the CSP can use script-src 'self'. -->
    <script src="/sw-cleanup.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
